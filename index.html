<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>听读空间 · 智能听力训练</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        body {
            background: #f2f4f8;
            display: flex;
            justify-content: center;
            padding: 20px 16px 40px;
        }

        #app {
            max-width: 1280px;
            width: 100%;
            margin: 0 auto;
        }

        .app-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .app-header h1 {
            font-size: 28px;
            font-weight: 620;
            background: linear-gradient(135deg, #1e2f4e, #0f1f36);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .app-header p {
            color: #5b6f8c;
            font-size: 14px;
        }

        .categories-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 24px;
        }
        .cat-pill {
            padding: 8px 20px;
            border-radius: 40px;
            background: white;
            border: 1px solid #e2e8f2;
            color: #2c3e50;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }
        .cat-pill.active {
            background: #1e3a5f;
            border-color: #1e3a5f;
            color: white;
            box-shadow: 0 6px 12px rgba(30,58,95,0.12);
        }

        .player-card {
            background: #ffffff;
            border-radius: 40px;
            box-shadow: 0 20px 35px -12px rgba(0, 20, 40, 0.12);
            padding: 24px 28px;
            margin-bottom: 28px;
            transition: all 0.2s;
            border: 1px solid #eef3fe;
        }

        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .lesson-main-title {
            flex: 1;
        }
        .lesson-main-title h2 {
            font-size: 26px;
            font-weight: 680;
            color: #0b1e32;
            letter-spacing: -0.3px;
            line-height: 1.25;
        }
        .lesson-main-title .category-badge {
            font-size: 14px;
            color: #5d718b;
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .fav-action {
            background: #f0f4fa;
            border-radius: 60px;
            padding: 8px 18px;
            font-size: 14px;
            font-weight: 500;
            color: #1e3a5f;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .time-area {
            margin: 20px 0 16px;
        }
        .time-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .time-digits {
            font-family: monospace;
            font-size: 18px;
            font-weight: 520;
            color: #1e2f44;
            background: #f1f5fb;
            padding: 4px 12px;
            border-radius: 40px;
            letter-spacing: 0.5px;
        }
        .progress-slider {
            width: 100%;
            height: 6px;
            border-radius: 12px;
            background: #dee6f0;
            -webkit-appearance: none;
        }
        .progress-slider::-webkit-slider-thumb {
            width: 18px;
            height: 18px;
            background: #1e3a5f;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            border: 2px solid white;
            cursor: pointer;
            -webkit-appearance: none;
        }

        .ctrl-row-1 {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 16px 0 12px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .play-group {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 0 auto;
        }
        .ctrl-icon {
            background: #f0f5fe;
            border: 1px solid #e2ebf5;
            width: 46px;
            height: 46px;
            border-radius: 60px;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #1e3a5f;
            transition: 0.15s;
        }
        .play-main {
            background: #1e3a5f;
            color: white;
            width: 58px;
            height: 58px;
            font-size: 28px;
            box-shadow: 0 8px 18px rgba(30,58,95,0.25);
            border: none;
        }

        .func-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 12px 0 8px;
            padding-top: 8px;
            border-top: 1px solid #ecf2f9;
        }
        .func-btn {
            background: #ffffff;
            border: 1px solid #dce5f0;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            color: #2c4c74;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }
        .func-btn:hover {
            background: #eef3fe;
            border-color: #b9cef0;
        }
        .func-btn.ab-active {
            background: #1e3a5f;
            color: white;
            border-color: #1e3a5f;
        }
        .blue-pencil {
            color: #1e88e5;
            margin-right: 4px;
        }
        .speed-selector {
            background: #ffffff;
            border: 1px solid #dce5f0;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            color: #2c4c74;
            cursor: pointer;
        }

        .extra-panel {
            margin-top: 24px;
            border-top: 1px solid #eef2f8;
            padding-top: 20px;
        }
        .panel-tabs {
            display: flex;
            gap: 24px;
            margin-bottom: 18px;
        }
        .tab-btn {
            font-size: 16px;
            font-weight: 550;
            color: #6f85a0;
            cursor: pointer;
            border: 1px solid #dce5f0;
            border-radius: 30px;
            padding: 6px 20px;
            background: white;
            transition: all 0.2s;
        }
        .tab-btn.active {
            color: #1e3a5f;
            border-color: #1e3a5f;
            background: #f0f7fe;
        }

        .transcript-card {
            border: 1px solid #dce5f0;
            border-radius: 24px;
            background: #fafcff;
            overflow: hidden;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            background: #f5f9fe;
            border-bottom: 1px solid #e6edf6;
            font-weight: 600;
            color: #1e3a5f;
        }
        .toggle-btn {
            background: none;
            border: none;
            color: #1e3a5f;
            font-size: 13px;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 30px;
            background: #eef3fc;
            transition: 0.1s;
        }
        .toggle-btn:hover {
            background: #e0e9f5;
        }
        .transcript-box {
            padding: 20px;
            line-height: 1.7;
            color: #1e2f44;
            max-height: 300px;
            overflow-y: auto;
            font-size: 15px;
            white-space: pre-wrap;
        }
        .translation-area {
            margin-top: 16px;
            background: #f0f7fe;
            border-radius: 24px;
            border-left: 4px solid #1e3a5f;
            display: none;
        }
        .translation-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: #eaf2fc;
            border-radius: 24px 24px 0 0;
            border-bottom: 1px solid #dce8f5;
        }
        .translation-header h4 {
            font-size: 14px;
            color: #1e3a5f;
            margin: 0;
        }
        .translation-content {
            padding: 16px 20px;
            font-size: 15px;
            line-height: 1.6;
            color: #1e2f44;
        }

        #dictationPanel {
            border: 1px solid #dce5f0;
            border-radius: 24px;
            padding: 20px;
            background: #ffffff;
        }
        .dictation-header-tools {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
        }
        .dictation-buttons {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .action-btn {
            background: #f0f5fe;
            border: 1px solid #d0ddeb;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.1s;
        }
        .action-btn.primary {
            background: #1e3a5f;
            color: white;
            border-color: #1e3a5f;
        }
        .mode-switch {
            display: flex;
            gap: 8px;
        }
        .mode-btn {
            padding: 6px 16px;
            border-radius: 30px;
            border: 1px solid #d0ddeb;
            background: #fff;
            color: #44566c;
            font-weight: 500;
            cursor: pointer;
            font-size: 14px;
            transition: 0.1s;
        }
        .mode-btn.active {
            background: #1e3a5f;
            color: white;
            border-color: #1e3a5f;
        }
        .dictation-text {
            background: #fff;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #e2eaf5;
            margin: 0 0 16px 0;
            line-height: 1.8;
        }
        .blank-wrapper {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin: 0 4px;
            vertical-align: middle;
            flex-wrap: wrap;
        }
        .blank-input {
            width: 110px;
            padding: 4px 8px;
            border: 1px solid #b9cef0;
            border-radius: 20px;
            text-align: center;
            font-size: 14px;
            transition: 0.1s;
        }
        .blank-input.correct {
            border-color: #2ecc71;
            background-color: #e8f8f0;
        }
        .blank-input.wrong {
            border-color: #e74c3c;
            background-color: #fef2f0;
        }
        .view-origin-btn {
            background: #f0f5fe;
            border: 1px solid #b9cef0;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 11px;
            cursor: pointer;
            margin-left: 4px;
            color: #1e3a5f;
        }
        .view-origin-btn:hover {
            background: #e0e9f5;
        }
        .word-chip {
            padding: 6px 14px;
            background: #fff;
            border: 1px solid #d7e0eb;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
        }
        .word-chip.selected {
            background: #1e3a5f;
            color: white;
        }
        .dictation-translation {
            margin-top: 20px;
            background: #f8fafd;
            border-radius: 20px;
            padding: 16px 20px;
            border: 1px solid #e2edf7;
            border-left: 3px solid #1e3a5f;
        }
        .dictation-translation h5 {
            font-size: 13px;
            color: #1e3a5f;
            margin-bottom: 0;
            display: inline-block;
        }
        .dictation-translation .trans-text {
            margin-top: 12px;
            font-size: 14px;
            line-height: 1.6;
            color: #2c3e50;
        }

        /* 生词本增强样式 */
        .vocab-list-item {
            display: block;
            padding: 12px 0;
            border-bottom: 1px solid #edf2f8;
        }
        .vocab-word-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .vocab-word {
            font-weight: 700;
            font-size: 16px;
            color: #1e2f44;
        }
        .vocab-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .dict-link {
            background: none;
            border: 1px solid #b9cef0;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 12px;
            cursor: pointer;
            color: #1e3a5f;
            text-decoration: none;
            display: inline-block;
        }
        .dict-link:hover {
            background: #eef3fc;
        }
        .delete-vocab {
            color: #c0392b;
            cursor: pointer;
            font-size: 14px;
            margin-left: 4px;
        }
        .vocab-translation {
            font-size: 13px;
            color: #2c6b2f;
            margin: 4px 0;
        }
        .vocab-example {
            font-size: 12px;
            color: #6f85a0;
            margin: 4px 0;
            font-style: italic;
        }
        .vocab-frequency {
            font-size: 12px;
            color: #e67e22;
            margin: 4px 0;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .star-filled {
            color: #f5b042;
        }
        .star-empty {
            color: #ddd;
        }

        .info-cards {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 28px;
        }
        .collapsible-card {
            background: white;
            border-radius: 28px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.03);
            border: 1px solid #eef3fc;
            overflow: hidden;
        }
        .card-title-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: #f9fbfe;
            cursor: pointer;
            font-weight: 650;
            font-size: 18px;
            color: #1e2f44;
            border-bottom: 1px solid #eef2f8;
        }
        .card-title-bar span:first-child {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card-content {
            padding: 16px 24px;
            max-height: 400px;
            overflow-y: auto;
            display: block;
        }
        .card-content.collapsed {
            display: none;
        }

        .fav-lesson-item {
            padding: 12px 0;
            border-bottom: 1px solid #edf2f8;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .fav-lesson-item:hover {
            background: #f8fafc;
        }
        .empty-placeholder {
            color: #8da0b8;
            text-align: center;
            padding: 20px;
        }

        .list-header {
            display: flex;
            justify-content: space-between;
            margin: 20px 0 14px;
        }
        .section-title {
            font-weight: 650;
            color: #1e2f44;
            font-size: 20px;
        }
        .category-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .category-card {
            background: white;
            border-radius: 32px;
            padding: 18px 22px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.03);
            border: 1px solid #eef3fc;
        }
        .category-header {
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
        }
        .category-cover {
            width: 52px;
            height: 52px;
            background: #eef3fc;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        .category-info {
            flex: 1;
        }
        .category-title {
            font-weight: 680;
            color: #0f293f;
            font-size: 18px;
        }
        .category-meta {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: #58708c;
            margin-top: 4px;
        }
        .expand-icon {
            font-size: 22px;
            color: #8da0b8;
            transition: 0.2s;
        }
        .expanded .expand-icon {
            transform: rotate(90deg);
        }
        .lessons-list {
            display: none;
            margin-top: 16px;
            border-top: 1px solid #eef2f8;
            padding-top: 14px;
        }
        .expanded .lessons-list {
            display: block;
        }
        .lesson-item-sub {
            padding: 12px 16px;
            background: #fafcff;
            border-radius: 20px;
            margin-bottom: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid transparent;
        }
        .lesson-item-sub.active {
            background: #e9f0fe;
            border-color: #c2d6f0;
        }
        .lesson-title-sub {
            font-weight: 600;
            color: #1e293b;
        }

        .footer-note {
            margin-top: 40px;
            text-align: center;
            color: #859ab3;
            font-size: 13px;
            border-top: 1px solid #e2eaf2;
            padding-top: 24px;
        }
        #audioPlayer { display: none; }
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #e2e8f0;
            border-top-color: #1e3a5f;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div id="app">
    <div class="app-header">
        <h1>🎧 听读空间</h1>
        <p>智能听力训练</p>
    </div>

    <div class="categories-wrap" id="categoryContainer"></div>

    <div class="player-card">
        <div class="player-header">
            <div class="lesson-main-title">
                <h2 id="playerMainTitle">美国加大对数据中心的打击力度</h2>
                <div class="category-badge"><span id="playerCategory">BBC精选</span> · 听力专栏</div>
            </div>
            <button class="fav-action" id="favCurrentBtn">🤍 收藏</button>
        </div>

        <div class="time-area">
            <div class="time-row">
                <span class="time-digits" id="currentTimeLabel">00:00</span>
                <span class="time-digits" id="durationLabel">00:00</span>
            </div>
            <input type="range" id="progressBar" class="progress-slider" value="0" step="0.1">
        </div>

        <div class="ctrl-row-1">
            <div class="play-group">
                <button class="ctrl-icon" id="prevBtn">⏮️</button>
                <button class="ctrl-icon play-main" id="playBtn">▶️</button>
                <button class="ctrl-icon" id="nextBtn">⏭️</button>
            </div>
        </div>

        <div class="func-row">
            <button class="func-btn" id="sentencePauseBtn">⏸️ 按句暂停</button>
            <button class="func-btn" id="abLoopBtn">🔄 AB循环</button>
            <button class="func-btn" id="dictationShortcutBtn"><span class="blue-pencil">✏️</span> 听写输入</button>
            <button class="func-btn" id="translationBtn">🌐 对照译文</button>
            <select id="speedSelect" class="speed-selector">
                <option value="0.5">0.5x</option>
                <option value="0.75">0.75x</option>
                <option value="1" selected>1.0x</option>
                <option value="1.25">1.25x</option>
                <option value="1.5">1.5x</option>
                <option value="2.0">2.0x</option>
            </select>
        </div>

        <div class="extra-panel">
            <div class="panel-tabs">
                <span class="tab-btn active" data-tab="transcript">听力原文</span>
                <span class="tab-btn" data-tab="dictation">听写填空</span>
            </div>
            <div id="transcriptPanel">
                <div class="transcript-card">
                    <div class="card-header">
                        <span>📖 听力原文</span>
                        <button class="toggle-btn" id="toggleTranscriptBtn">隐藏</button>
                    </div>
                    <div class="transcript-box" id="transcriptContent">暂无原文</div>
                </div>
                <div id="translationArea" class="translation-area" style="display: none;">
                    <div class="translation-header">
                        <h4>🌐 对照译文</h4>
                        <button class="toggle-btn" id="toggleTranslationBtn">显示</button>
                    </div>
                    <div class="translation-content" id="translationContent">点击“对照译文”按钮获取翻译</div>
                </div>
            </div>
            <div id="dictationPanel" style="display:none;">
                <div class="dictation-header-tools">
                    <div style="display: flex; gap: 12px; align-items: center;">
                        <div class="mode-switch">
                            <span class="mode-btn active" data-dict-mode="random">🎲 随机练习</span>
                            <span class="mode-btn" data-dict-mode="custom">📌 指定练习</span>
                        </div>
                        <button class="refresh-btn action-btn" id="refreshDictationBtn">🔄 刷新题目</button>
                    </div>
                    <div class="dictation-buttons">
                        <button class="action-btn primary" id="checkDictationBtn">✅ 校对答案</button>
                        <button class="action-btn" id="addSelectedWordsBtn">📝 添加选中</button>
                        <button class="action-btn" id="addAllWordsBtn">📚 全部添加</button>
                    </div>
                </div>
                <div id="customWordSelectorWrapper" style="display:none;">
                    <div class="word-selector" id="wordSelector"></div>
                </div>
                <div class="dictation-text" id="dictationExercise"></div>
                <div id="dictationTranslationArea" class="dictation-translation">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <h5>📖 对照译文</h5>
                        <button class="toggle-btn" id="toggleDictationTranslationBtn">隐藏</button>
                    </div>
                    <div class="trans-text" id="dictationTranslationContent">点击“刷新题目”或切换课程后自动加载译文</div>
                </div>
            </div>
        </div>
    </div>

    <div class="info-cards">
        <div class="collapsible-card" id="vocabCard">
            <div class="card-title-bar">
                <span>📘 生词本 (<span id="vocabCount">0</span>)</span>
                <span class="toggle-icon">▲</span>
            </div>
            <div class="card-content" id="vocabCardContent">
                <div id="vocabListContainer">暂无生词</div>

</div>

<script>
    (function(){
        // 修正：描述字段中去掉“，中英对照”
        const DEFAULT_CATEGORIES = [

            { id:4, title:"经济学人合集", category:"经济学人", count:"2050", sub:"81w+", desc:"商业金融深度文", cover:"📊",
              lessons: [ { id:"4-1", title:"半导体供应链重构", audio:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3", transcript:"Global chip supply chains are being reshaped. US and Europe invest billions to reduce reliance on Asia." } ] },
            { id:5, title:"VOA慢速-时事新闻", category:"VOA慢速英语", count:"1050", sub:"4w+", desc:"每周热点", cover:"📰",
              lessons: [ { id:"5-1", title:"印度登月成功", audio:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3", transcript:"India becomes fourth country to land on moon. Chandrayaan-3 touches down near south pole." } ] },
            { id:6, title:"科学美国人", category:"科学美国人", count:"2000", sub:"35w+", desc:"60秒科学", cover:"🔬",
              lessons: [ { id:"6-1", title:"章鱼神经系统", audio:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-7.mp3", transcript:"Octopuses have unique nervous system. Each arm can make decisions independently." } ] },
            { id:7, title:"NPR News", category:"NPR News", count:"950", sub:"10w+", desc:"美国公共电台", cover:"🎙️",
              lessons: [ { id:"7-1", title:"图书馆电子书争议", audio:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3", transcript:"Libraries face high e-book costs. Publishers charge up to five times consumer price." } ] },
            { id:8, title:"TED演讲视频", category:"TED演讲", count:"1300", sub:"45w+", desc:"启发思想", cover:"💡",
              lessons: [ { id:"8-1", title:"数字韧性培养", audio:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-9.mp3", transcript:"Digital resilience matters more than screen time limits. Open conversations help children." } ] },
            { id:9, title:"AP News", category:"AP News", count:"1080", sub:"6w+", desc:"美联社新闻", cover:"📡",
              lessons: [ { id:"9-1", title:"威尼斯入城费", audio:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3", transcript:"Venice charges day-trippers entry fee. The measure aims to reduce overcrowding." } ] }
        ];

        let categories = [], filteredCategories = [];
        let currentLesson = null, currentCategory = null;
        let isPlaying = false;
        let favorites = new Set(), vocabList = [];
        let dictMode = 'random', selectedWords = new Set(), currentWords = [];
        let abLoopActive = false, abLoopStart = 0, abLoopEnd = 0, abState = 0;

        // DOM 元素
        const audioPlayer = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressBar = document.getElementById('progressBar');
        const currentTimeLabel = document.getElementById('currentTimeLabel');
        const durationLabel = document.getElementById('durationLabel');
        const playerMainTitle = document.getElementById('playerMainTitle');
        const playerCategorySpan = document.getElementById('playerCategory');
        const favCurrentBtn = document.getElementById('favCurrentBtn');
        const transcriptContent = document.getElementById('transcriptContent');
        const translationArea = document.getElementById('translationArea');
        const translationContent = document.getElementById('translationContent');
        const tabBtns = document.querySelectorAll('.tab-btn');
        const transcriptPanel = document.getElementById('transcriptPanel');
        const dictationPanel = document.getElementById('dictationPanel');
        const dictationExercise = document.getElementById('dictationExercise');
        const refreshBtn = document.getElementById('refreshDictationBtn');
        const wordSelectorDiv = document.getElementById('wordSelector');
        const customWordSelectorWrapper = document.getElementById('customWordSelectorWrapper');
        const modeBtns = document.querySelectorAll('.mode-btn');
        const vocabCountSpan = document.getElementById('vocabCount');
        const favCountSpan = document.getElementById('favCount');
        const speedSelect = document.getElementById('speedSelect');
        const dictationTranslationContent = document.getElementById('dictationTranslationContent');
        const toggleTranscriptBtn = document.getElementById('toggleTranscriptBtn');
        const toggleTranslationBtn = document.getElementById('toggleTranslationBtn');
        const checkDictationBtn = document.getElementById('checkDictationBtn');
        const addSelectedWordsBtn = document.getElementById('addSelectedWordsBtn');
        const addAllWordsBtn = document.getElementById('addAllWordsBtn');
        const vocabListContainer = document.getElementById('vocabListContainer');
        const favoritesListContainer = document.getElementById('favoritesListContainer');
        const abLoopBtn = document.getElementById('abLoopBtn');
        const toggleDictationTranslationBtn = document.getElementById('toggleDictationTranslationBtn');

        // 辅助函数
        function formatTime(sec){ if(isNaN(sec))return'00:00'; const m=Math.floor(sec/60), s=Math.floor(sec%60); return `${m}:${s<10?'0'+s:s}`; }
        function updateFavUI(){ favCountSpan.textContent = favorites.size; renderFavoritesList(); }
        function saveFav(){ localStorage.setItem('fav_lessons_v2', JSON.stringify([...favorites])); updateFavUI(); }
        function loadFav(){ try{ const v=localStorage.getItem('fav_lessons_v2'); if(v) favorites=new Set(JSON.parse(v)); }catch(e){} updateFavUI(); }
        function loadVocab(){ try{ const v=localStorage.getItem('vocab_list_v2'); if(v) vocabList=JSON.parse(v); }catch(e){} updateVocabUI(); }
        function saveVocab(){ localStorage.setItem('vocab_list_v2', JSON.stringify(vocabList)); updateVocabUI(); }
        function updateVocabUI(){ vocabCountSpan.textContent = vocabList.length; renderVocabList(); }
        function addToVocab(word, source){ if(!vocabList.find(v=>v.word.toLowerCase()===word.toLowerCase())){ vocabList.push({word, source}); saveVocab(); } }

        // 翻译函数
        async function fetchTranslation(text) {
            const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|zh-CN`;
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                if (data && data.responseData && data.responseData.translatedText) {
                    let translated = data.responseData.translatedText;
                    translated = translated.replace(/&#39;/g, "'").replace(/&quot;/g, '"');
                    return translated;
                } else { throw new Error("翻译异常"); }
            } catch (err) {
                console.warn("翻译失败", err);
                return "翻译服务暂不可用";
            }
        }

        // 增强的生词本渲染 (仅保留有道链接)
        async function renderVocabList(){
            if(!vocabListContainer) return;
            if(!vocabList.length){ vocabListContainer.innerHTML='<div class="empty-placeholder">暂无生词</div>'; return; }
            let html = '';
            for (let i = 0; i < vocabList.length; i++) {
                const v = vocabList[i];
                const word = v.word;
                let translation = '加载中...';
                let example = `例句: 正在生成...`;
                let frequency = 3;
                try {
                    const trans = await fetchTranslation(word);
                    translation = trans.length > 50 ? trans.substring(0, 50) + '…' : trans;
                    example = `例句: "I need to learn the word '${word}' in context."`;
                    const len = word.length;
                    if (len <= 3) frequency = 5;
                    else if (len <= 5) frequency = 4;
                    else if (len <= 8) frequency = 3;
                    else if (len <= 10) frequency = 2;
                    else frequency = 1;
                } catch(e) {
                    translation = '翻译获取失败';
                    example = '暂无例句';
                }
                const stars = '★'.repeat(frequency) + '☆'.repeat(5-frequency);
                html += `
                    <div class="vocab-list-item" data-word="${word}">
                        <div class="vocab-word-header">
                            <span class="vocab-word">${word}</span>
                            <div class="vocab-actions">
                                <a href="https://dict.youdao.com/search?q=${encodeURIComponent(word)}" target="_blank" class="dict-link" title="有道词典">🔍 有道</a>
                                <span class="delete-vocab" data-word="${word}">🗑️</span>
                            </div>
                        </div>
                        <div class="vocab-translation">📖 ${translation}</div>
                        <div class="vocab-example">📝 ${example}</div>
                        <div class="vocab-frequency">📊 柯林斯词频: <span class="${frequency >= 3 ? 'star-filled' : 'star-empty'}">${stars}</span></div>
                    </div>
                `;
            }
            vocabListContainer.innerHTML = html;
            document.querySelectorAll('.delete-vocab').forEach(el => {
                el.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const w = el.dataset.word;
                    vocabList = vocabList.filter(v => v.word !== w);
                    saveVocab();
                });
            });
        }

        function renderFavoritesList(){
            if(!favoritesListContainer) return;
            if(favorites.size === 0){ favoritesListContainer.innerHTML='<div class="empty-placeholder">暂无收藏课程</div>'; return; }
            let flatLessons = [];
            categories.forEach(cat => {
                cat.lessons.forEach(lesson => {
                    if(favorites.has(lesson.id)) flatLessons.push({lesson, category: cat});
                });
            });
            let html = '';
            flatLessons.forEach(item => {
                html += `<div class="fav-lesson-item" data-lesson-id="${item.lesson.id}" data-cat-id="${item.category.id}">
                            <span>📘 ${item.lesson.title}</span>
                            <span style="color:#e67e22;">★ 已收藏</span>
                         </div>`;
            });
            favoritesListContainer.innerHTML = html;
            document.querySelectorAll('.fav-lesson-item').forEach(el => {
                el.addEventListener('click', () => {
                    const lid = el.dataset.lessonId;
                    for(let cat of categories){
                        const l = cat.lessons.find(l=>l.id===lid);
                        if(l){ playLesson(l, cat); break; }
                    }
                });
            });
        }
        
        function updatePlayerUI(){ if(currentLesson){ playerMainTitle.textContent = currentLesson.title; playerCategorySpan.textContent = currentCategory?.title || '听力专栏'; transcriptContent.textContent = currentLesson.transcript || '暂无原文'; favCurrentBtn.innerHTML = (favorites.has(currentLesson.id)) ? '❤️ 已收藏' : '🤍 收藏'; if(dictationPanel.style.display !== 'none') { updateDictationPanel(); loadDictationTranslation(); } translationArea.style.display = 'none'; } else { playerMainTitle.textContent = '点击课时播放'; playerCategorySpan.textContent = '听力专栏'; favCurrentBtn.innerHTML = '🤍 收藏'; } }
        function playLesson(lesson, category){ 
            currentLesson=lesson; 
            currentCategory=category; 
            audioPlayer.src=lesson.audio; 
            audioPlayer.load(); 
            resetABLoop();
            updatePlayerUI(); 
            renderCategoryList(); 
            if(isPlaying) audioPlayer.play().catch(()=>{}); 
        }
        function togglePlay(){ if(!audioPlayer.src) return; if(audioPlayer.paused){ audioPlayer.play(); playBtn.textContent='⏸️'; isPlaying=true; } else { audioPlayer.pause(); playBtn.textContent='▶️'; isPlaying=false; } }
        function getFlatLessons(){ let flat=[]; filteredCategories.forEach(cat=>cat.lessons.forEach(l=>flat.push({lesson:l, category:cat}))); return flat; }
        function prevLesson(){ const flat=getFlatLessons(); if(!flat.length)return; let idx=flat.findIndex(i=>i.lesson.id===currentLesson?.id); idx=(idx-1+flat.length)%flat.length; playLesson(flat[idx].lesson, flat[idx].category); }
        function nextLesson(){ const flat=getFlatLessons(); if(!flat.length)return; let idx=flat.findIndex(i=>i.lesson.id===currentLesson?.id); idx=(idx+1)%flat.length; playLesson(flat[idx].lesson, flat[idx].category); }

        function resetABLoop() {
            abLoopActive = false;
            abState = 0;
            abLoopStart = 0;
            abLoopEnd = 0;
            if(abLoopBtn) {
                abLoopBtn.textContent = '🔄 AB循环';
                abLoopBtn.classList.remove('ab-active');
            }
        }
        function handleABLoop() {
            if(!audioPlayer.src) { alert("请先播放课程"); return; }
            const currentTime = audioPlayer.currentTime;
            if(abState === 0) {
                abLoopStart = currentTime;
                abState = 1;
                abLoopBtn.textContent = `🔴 起点 ${formatTime(abLoopStart)} → 再点设终点`;
                abLoopBtn.classList.add('ab-active');
                alert(`已设置起点: ${formatTime(abLoopStart)}，请拖动到终点位置再次点击`);
            } else if(abState === 1) {
                if(currentTime <= abLoopStart) { alert("终点必须大于起点"); return; }
                abLoopEnd = currentTime;
                abLoopActive = true;
                abState = 2;
                abLoopBtn.textContent = `🔄 AB循环 (${formatTime(abLoopStart)}-${formatTime(abLoopEnd)}) ✅`;
                alert(`AB循环已启用: ${formatTime(abLoopStart)} → ${formatTime(abLoopEnd)}，再次点击关闭循环`);
            } else {
                resetABLoop();
                alert("AB循环已关闭");
            }
        }
        function checkABLoop() {
            if(abLoopActive && abLoopEnd > abLoopStart && audioPlayer.currentTime >= abLoopEnd) {
                audioPlayer.currentTime = abLoopStart;
                if(audioPlayer.paused) audioPlayer.play();
            }
        }

        function renderCategoryList(){ let html=''; filteredCategories.forEach(cat=>{ const expanded=cat.expanded||false; html+=`<div class="category-card ${expanded?'expanded':''}" data-cat-id="${cat.id}"><div class="category-header"><div class="category-cover">${cat.cover}</div><div class="category-info"><div class="category-title">${cat.title}</div><div class="category-meta"><span>📄 ${cat.count}</span><span>👥 ${cat.sub}</span></div><div class="category-desc">${cat.desc}</div></div><span class="expand-icon">▶</span></div><div class="lessons-list">${cat.lessons.map((l,idx)=>`<div class="lesson-item-sub ${currentLesson?.id===l.id?'active':''}" data-lesson-id="${l.id}"><span class="lesson-index">${idx+1}</span><div class="lesson-info-sub"><div class="lesson-title-sub">${l.title}</div></div><span class="fav-icon-small" data-lesson-id="${l.id}" style="cursor:pointer;">${favorites.has(l.id)?'★':'☆'}</span></div>`).join('')}</div></div>`; });
            categoryListEl.innerHTML=html; attachCatEvents(); }
        function attachCatEvents(){ document.querySelectorAll('.category-header').forEach(h=>h.addEventListener('click',e=>{ if(e.target.closest('.fav-icon-small'))return; const card=h.closest('.category-card'); const cat=filteredCategories.find(c=>c.id==card.dataset.catId); if(cat) cat.expanded=!cat.expanded; renderCategoryList(); })); document.querySelectorAll('.lesson-item-sub').forEach(el=>el.addEventListener('click',e=>{ if(e.target.closest('.fav-icon-small'))return; const lid=el.dataset.lessonId; for(let cat of filteredCategories){ const l=cat.lessons.find(l=>l.id===lid); if(l){ playLesson(l,cat); break; } } })); document.querySelectorAll('.fav-icon-small').forEach(s=>s.addEventListener('click',e=>{ e.stopPropagation(); const lid=s.dataset.lessonId; if(favorites.has(lid)) favorites.delete(lid); else favorites.add(lid); saveFav(); renderCategoryList(); updatePlayerUI(); renderFavoritesList(); })); }

        function extractWords(t){ return [...new Set(t.split(/\s+/).filter(w=>w.length>2).map(w=>w.replace(/[.,!?;:]/g,'')))]; }
        function updateDictationPanel(){ if(!currentLesson)return; currentWords=extractWords(currentLesson.transcript||''); if(dictMode==='custom'){ customWordSelectorWrapper.style.display='block'; refreshBtn.style.display='none'; renderWordSelector(); } else { customWordSelectorWrapper.style.display='none'; refreshBtn.style.display='inline-flex'; } renderDictationExercise(); }
        function renderWordSelector(){ let html=''; currentWords.forEach(w=>{ const sel=selectedWords.has(w)?'selected':''; html+=`<span class="word-chip ${sel}" data-word="${w}">${w}</span>`; }); wordSelectorDiv.innerHTML=html; document.querySelectorAll('.word-chip').forEach(c=>c.addEventListener('click',()=>{ const w=c.dataset.word; if(selectedWords.has(w)) selectedWords.delete(w); else selectedWords.add(w); renderWordSelector(); renderDictationExercise(); })); }
        
        // 听写填空渲染（带实时验证）
        function renderDictationExercise() {
            if (!currentLesson) return;
            let wordsToBlank = [];
            if (dictMode === 'custom') wordsToBlank = Array.from(selectedWords);
            else {
                if (!currentWords.length) return;
                wordsToBlank = [...currentWords].sort(() => 0.5 - Math.random()).slice(0, 5);
            }
            if (!wordsToBlank.length) {
                dictationExercise.innerHTML = '<span>请选择词汇或刷新</span>';
                return;
            }
            const pattern = new RegExp(`\\b(${wordsToBlank.join('|')})\\b`, 'gi');
            let resultHtml = currentLesson.transcript.replace(pattern, (match) => {
                return `<span class="blank-wrapper">
                            <input type="text" class="blank-input" data-answer="${match}" placeholder="_____" value="">
                            <label class="blank-checkbox" style="margin-left:4px;">
                                <input type="checkbox" class="word-checkbox" data-word="${match}">
                            </label>
                        </span>`;
            });
            dictationExercise.innerHTML = resultHtml;
            // 绑定实时验证
            document.querySelectorAll('.blank-input').forEach(input => {
                const correctAnswer = input.dataset.answer;
                const validate = () => {
                    const userVal = input.value.trim().toLowerCase();
                    if (userVal === correctAnswer.toLowerCase()) {
                        input.classList.add('correct');
                        input.classList.remove('wrong');
                    } else {
                        input.classList.add('wrong');
                        input.classList.remove('correct');
                    }
                };
                input.addEventListener('input', validate);
                input.addEventListener('blur', validate);
            });
        }

        // 校对答案：统计正确数，并为错误填空添加“查看原文”按钮
        function checkDictationAnswers() {
            const inputs = document.querySelectorAll('.blank-input');
            let correctCount = 0;
            document.querySelectorAll('.view-origin-btn').forEach(btn => btn.remove());
            inputs.forEach(input => {
                const userAnswer = input.value.trim().toLowerCase();
                const correctAnswer = input.dataset.answer.toLowerCase();
                const wrapper = input.closest('.blank-wrapper');
                if (userAnswer === correctAnswer) {
                    input.classList.add('correct');
                    input.classList.remove('wrong');
                    correctCount++;
                    const existingBtn = wrapper.querySelector('.view-origin-btn');
                    if (existingBtn) existingBtn.remove();
                } else {
                    input.classList.add('wrong');
                    input.classList.remove('correct');
                    if (!wrapper.querySelector('.view-origin-btn')) {
                        const btn = document.createElement('button');
                        btn.textContent = '📖 查看原文';
                        btn.className = 'view-origin-btn';
                        btn.addEventListener('click', () => {
                            const fullText = currentLesson.transcript;
                            const correctWord = input.dataset.answer;
                            const sentences = fullText.split(/(?<=[.!?])\s+/);
                            let foundSentence = '';
                            for (let sent of sentences) {
                                if (new RegExp(`\\b${correctWord}\\b`, 'i').test(sent)) {
                                    foundSentence = sent.trim();
                                    break;
                                }
                            }
                            if (foundSentence) {
                                alert(`正确答案: "${correctWord}"\n原文句子: ${foundSentence}`);
                            } else {
                                alert(`正确答案: "${correctWord}"`);
                            }
                        });
                        wrapper.appendChild(btn);
                    }
                }
            });
            alert(`校对完成！正确 ${correctCount}/${inputs.length}`);
        }

        function addSelectedWords(){
            const checkboxes = document.querySelectorAll('.word-checkbox:checked');
            if(checkboxes.length === 0){ alert("请先勾选要添加的单词"); return; }
            let added = 0;
            checkboxes.forEach(cb => {
                const word = cb.dataset.word;
                if(word && !vocabList.find(v=>v.word.toLowerCase()===word.toLowerCase())){
                    vocabList.push({word, source: currentLesson?.title || '听写填空'});
                    added++;
                }
            });
            if(added>0) saveVocab();
            alert(`成功添加 ${added} 个生词`);
        }
        function addAllWords(){
            const inputs = document.querySelectorAll('.blank-input');
            if(inputs.length === 0){ alert("没有可添加的单词"); return; }
            let added = 0;
            const uniqueWords = new Set();
            inputs.forEach(input => { uniqueWords.add(input.dataset.answer); });
            uniqueWords.forEach(word => {
                if(word && !vocabList.find(v=>v.word.toLowerCase()===word.toLowerCase())){
                    vocabList.push({word, source: currentLesson?.title || '听写填空'});
                    added++;
                }
            });
            if(added>0) saveVocab();
            alert(`成功添加 ${added} 个生词 (去重后)`);
        }

        async function loadDictationTranslation() { if(!currentLesson) return; dictationTranslationContent.innerHTML = '<span class="loading-spinner"></span> 获取译文中...'; try { const translated = await fetchTranslation(currentLesson.transcript); dictationTranslationContent.innerText = translated; } catch(e){ dictationTranslationContent.innerText = "译文加载失败"; } }
        async function showTranslation() { if(!currentLesson) return; translationArea.style.display = 'block'; translationContent.innerText = "正在获取在线译文..."; try { const translated = await fetchTranslation(currentLesson.transcript); translationContent.innerText = translated; } catch(e){ translationContent.innerText = "翻译失败"; } }
        function sentencePause(){ alert("按句播放演示: 可配合AB循环精听句子。"); }
        async function loadData(){ try{ const res=await fetch('data.json'); if(res.ok) categories=await res.json(); else throw new Error(); }catch(e){ categories=DEFAULT_CATEGORIES; } filteredCategories=categories.map(c=>({...c, expanded:false})); renderCategoryList(); renderCategoriesFilter(); renderFavoritesList(); }
        function renderCategoriesFilter(){ let uniq=[...new Set(categories.map(c=>c.category))]; let html=`<div class="cat-pill active" data-cat="all">全部</div>`; uniq.forEach(c=>{ html+=`<div class="cat-pill" data-cat="${c}">${c}</div>`; }); document.getElementById('categoryContainer').innerHTML=html; document.querySelectorAll('.cat-pill').forEach(b=>b.addEventListener('click',()=>{ let val=b.dataset.cat; filteredCategories=(val==='all'?categories:categories.filter(c=>c.category===val)).map(c=>({...c,expanded:false})); renderCategoryList(); document.querySelectorAll('.cat-pill').forEach(p=>p.classList.remove('active')); b.classList.add('active'); })); }

        function initCollapsibleCards() {
            const vocabCard = document.getElementById('vocabCard');
            const favCard = document.getElementById('favoritesCard');
            const vocabContent = document.getElementById('vocabCardContent');
            const favContent = document.getElementById('favCardContent');
            const vocabIcon = vocabCard.querySelector('.toggle-icon');
            const favIcon = favCard.querySelector('.toggle-icon');
            vocabCard.querySelector('.card-title-bar').addEventListener('click', () => {
                if (vocabContent.classList.contains('collapsed')) {
                    vocabContent.classList.remove('collapsed');
                    vocabIcon.textContent = '▲';
                } else {
                    vocabContent.classList.add('collapsed');
                    vocabIcon.textContent = '▼';
                }
            });
            favCard.querySelector('.card-title-bar').addEventListener('click', () => {
                if (favContent.classList.contains('collapsed')) {
                    favContent.classList.remove('collapsed');
                    favIcon.textContent = '▲';
                } else {
                    favContent.classList.add('collapsed');
                    favIcon.textContent = '▼';
                }
            });
        }

        function bindEvents(){
            playBtn.addEventListener('click',togglePlay); prevBtn.addEventListener('click',prevLesson); nextBtn.addEventListener('click',nextLesson);
            audioPlayer.addEventListener('loadedmetadata',()=>{ durationLabel.textContent=formatTime(audioPlayer.duration); progressBar.max=audioPlayer.duration||0; });
            audioPlayer.addEventListener('timeupdate',()=>{ currentTimeLabel.textContent=formatTime(audioPlayer.currentTime); progressBar.value=audioPlayer.currentTime; checkABLoop(); });
            audioPlayer.addEventListener('ended',()=>{ if(abLoopActive) { audioPlayer.currentTime = abLoopStart; audioPlayer.play(); } else { nextLesson(); } });
            progressBar.addEventListener('input',e=>audioPlayer.currentTime=e.target.value);
            speedSelect.addEventListener('change',e=>{ audioPlayer.playbackRate=parseFloat(e.target.value); });
            favCurrentBtn.addEventListener('click',()=>{ if(!currentLesson)return; let id=currentLesson.id; if(favorites.has(id)) favorites.delete(id); else favorites.add(id); saveFav(); updatePlayerUI(); renderCategoryList(); renderFavoritesList(); });
            tabBtns.forEach(t=>t.addEventListener('click',()=>{ let tab=t.dataset.tab; tabBtns.forEach(tt=>tt.classList.remove('active')); t.classList.add('active'); if(tab==='transcript'){ transcriptPanel.style.display='block'; dictationPanel.style.display='none'; }else{ transcriptPanel.style.display='none'; dictationPanel.style.display='block'; updateDictationPanel(); loadDictationTranslation(); } }));
            modeBtns.forEach(b=>b.addEventListener('click',()=>{ dictMode=b.dataset.dictMode; modeBtns.forEach(m=>m.classList.remove('active')); b.classList.add('active'); selectedWords.clear(); updateDictationPanel(); }));
            refreshBtn.addEventListener('click',()=>{ renderDictationExercise(); loadDictationTranslation(); document.querySelectorAll('.view-origin-btn').forEach(btn=>btn.remove()); });
            if(checkDictationBtn) checkDictationBtn.addEventListener('click', checkDictationAnswers);
            if(addSelectedWordsBtn) addSelectedWordsBtn.addEventListener('click', addSelectedWords);
            if(addAllWordsBtn) addAllWordsBtn.addEventListener('click', addAllWords);
            document.getElementById('sentencePauseBtn').addEventListener('click',sentencePause);
            document.getElementById('dictationShortcutBtn').addEventListener('click',()=>{ document.querySelector('.tab-btn[data-tab="dictation"]').click(); });
            document.getElementById('translationBtn').addEventListener('click',showTranslation);
            if(toggleTranscriptBtn){ const box=document.querySelector('.transcript-box'); toggleTranscriptBtn.onclick=()=>{ if(box.style.display==='none'){ box.style.display='block'; toggleTranscriptBtn.textContent='隐藏'; } else { box.style.display='none'; toggleTranscriptBtn.textContent='显示'; } }; }
            if(toggleTranslationBtn){ const contentDiv=document.querySelector('#translationArea .translation-content'); toggleTranslationBtn.onclick=()=>{ if(contentDiv.style.display==='none'){ contentDiv.style.display='block'; toggleTranslationBtn.textContent='隐藏'; } else { contentDiv.style.display='none'; toggleTranslationBtn.textContent='显示'; } }; }
            if(abLoopBtn) abLoopBtn.addEventListener('click', handleABLoop);
            if(toggleDictationTranslationBtn && dictationTranslationContent) {
                toggleDictationTranslationBtn.addEventListener('click', () => {
                    if (dictationTranslationContent.style.display === 'none') {
                        dictationTranslationContent.style.display = 'block';
                        toggleDictationTranslationBtn.textContent = '隐藏';
                    } else {
                        dictationTranslationContent.style.display = 'none';
                        toggleDictationTranslationBtn.textContent = '显示';
                    }
                });
            }
        }

        const categoryListEl = document.getElementById('categoryList');
        loadFav(); loadVocab(); loadData(); bindEvents(); initCollapsibleCards();
        setTimeout(()=>{ if(categories.length && categories[0].lessons.length) playLesson(categories[0].lessons[0], categories[0]); }, 100);
    })();
</script>
</body>
</html>
