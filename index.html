<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>听读空间 · 听力专栏</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;}
        body{background:#f5f7fc;display:flex;justify-content:center;min-height:100vh;padding:16px 12px;}
        #app{max-width:1280px;width:100%;margin:0 auto;}

        .app-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:20px;}
        .app-header h1{font-size:28px;font-weight:620;background:linear-gradient(145deg,#1e2a3a,#0f1a2b);-webkit-background-clip:text;background-clip:text;color:transparent;}
        .app-header p{color:#5e6f8b;font-size:15px;}

        .categories-wrap{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:24px;}
        .cat-pill{padding:8px 20px;border-radius:40px;background:white;border:1px solid #e3e9f2;color:#2c3e50;font-weight:500;font-size:15px;box-shadow:0 4px 8px rgba(0,0,0,0.02);cursor:pointer;transition:all 0.18s;}
        .cat-pill.active{background:#1e3c72;border-color:#1e3c72;color:white;box-shadow:0 8px 14px rgba(28,60,110,0.12);}
        .cat-pill:hover{background:#eef3fc;}

        .player-section{background:#ffffff;border-radius:36px;padding:24px 28px;box-shadow:0 20px 35px -8px rgba(0,20,45,0.08);border:1px solid #fff;margin-bottom:24px;}
        .now-info{display:flex;align-items:center;gap:14px;margin-bottom:18px;}
        .cover-badge{width:58px;height:58px;background:linear-gradient(145deg,#e7edf8,#d9e2f0);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px;}
        .title-wrap{flex:1;}
        .current-title{font-size:22px;font-weight:680;color:#0b1e32;}
        .current-subtitle{color:#617388;margin-top:4px;font-size:15px;}

        .progress-area{margin:10px 0 12px;}
        .time-row{display:flex;align-items:center;gap:14px;}
        .time-text{font-size:14px;color:#44566c;font-variant-numeric:tabular-nums;}
        .progress-bar{flex:1;height:6px;border-radius:12px;background:#dfe7f0;-webkit-appearance:none;}
        .progress-bar::-webkit-slider-thumb{width:18px;height:18px;background:#1e3c72;border-radius:50%;box-shadow:0 2px 8px #00234633;border:2px solid white;cursor:pointer;-webkit-appearance:none;}

        .ctrl-bar{display:flex;align-items:center;justify-content:space-between;margin-top:16px;flex-wrap:wrap;gap:12px;}
        .ctrl-left{display:flex;align-items:center;gap:12px;}
        .ctrl-btn{background:#f0f5fe;border:none;width:40px;height:40px;border-radius:30px;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#1e3a5f;box-shadow:0 4px 8px rgba(0,0,0,0.02);border:1px solid #e9f0fa;}
        .play-btn{width:56px;height:56px;background:#1e3c72;color:white;font-size:28px;box-shadow:0 12px 18px -8px #10263e50;border:none;}
        .ctrl-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
        .loop-group{display:flex;align-items:center;background:#f3f7ff;border-radius:40px;border:1px solid #dee9f5;}
        .loop-opt{padding:8px 16px;font-size:14px;font-weight:500;color:#1e3c72;cursor:pointer;border-radius:40px;}
        .loop-opt.active{background:#1e3c72;color:white;}
        .ab-loop-btn{background:#f3f7ff;border:1px solid #dee9f5;padding:8px 16px;border-radius:40px;font-size:14px;font-weight:500;color:#1e3c72;cursor:pointer;}
        .ab-loop-btn.active{background:#e67e22;color:white;}
        .fav-toggle{padding:8px 18px;border-radius:40px;font-size:14px;font-weight:500;background:#f3f7ff;border:1px solid #dee9f5;color:#1e3c72;cursor:pointer;}
        .speed-select{padding:8px 12px;border-radius:30px;border:1px solid #dee9f5;background:white;font-size:14px;}

        .fav-section{margin-bottom:20px;display:flex;justify-content:flex-end;gap:12px;}
        .fav-badge{background:#fff2e6;padding:8px 18px;border-radius:40px;color:#a65200;font-weight:500;border:1px solid #ffe4cc;cursor:pointer;}
        .vocab-badge{background:#e9eefa;padding:8px 18px;border-radius:40px;color:#1e3c72;font-weight:500;border:1px solid #cbdaf0;cursor:pointer;}

        .extra-panel{margin-top:24px;border-top:1px solid #e9ecf2;padding-top:20px;}
        .panel-tabs{display:flex;gap:20px;margin-bottom:16px;}
        .tab-btn{font-size:16px;font-weight:500;color:#6f85a0;cursor:pointer;padding-bottom:8px;border-bottom:2px solid transparent;}
        .tab-btn.active{color:#1e3c72;border-bottom-color:#1e3c72;}
        .transcript-box{background:#f9fbfe;border-radius:24px;padding:20px;line-height:1.7;color:#1e2f44;max-height:300px;overflow-y:auto;font-size:15px;border:1px solid #eef2f8;white-space:pre-wrap;}
        .transcript-header{display:flex;justify-content:space-between;margin-bottom:12px;}

        .mode-switch{display:flex;gap:12px;margin-bottom:16px;}
        .mode-btn{padding:6px 16px;border-radius:30px;border:1px solid #d7e0eb;background:#fff;color:#44566c;font-weight:500;cursor:pointer;font-size:14px;}
        .mode-btn.active{background:#1e3c72;color:#fff;}
        .refresh-btn{margin-left:auto;padding:6px 16px;border-radius:30px;border:1px solid #cbd5e1;background:#f8fafc;cursor:pointer;font-size:14px;}
        .word-selector{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;}
        .word-chip{padding:6px 14px;background:#fff;border:1px solid #d7e0eb;border-radius:30px;font-size:14px;cursor:pointer;}
        .word-chip.selected{background:#1e3c72;color:white;}
        .dictation-text{background:#fff;border-radius:20px;padding:20px;border:1px solid #e2eaf5;margin:16px 0;}
        .blank-input{display:inline-block;width:100px;margin:0 4px;padding:4px 8px;border:1px solid #bcc9dc;border-radius:16px;text-align:center;}
        .check-btn{padding:10px 24px;background:#1e3c72;color:white;border:none;border-radius:30px;font-weight:500;cursor:pointer;}

        .list-header{display:flex;justify-content:space-between;margin:20px 0 14px;}
        .section-title{font-weight:650;color:#1e2f44;font-size:20px;}
        .count-badge{background:#e4ebf5;padding:4px 14px;border-radius:30px;color:#2e4b6e;}

        .category-grid{display:flex;flex-direction:column;gap:16px;}
        .category-card{background:#fff;border-radius:28px;padding:18px 20px;box-shadow:0 12px 22px -8px rgba(20,40,70,0.06);border:1px solid #f0f4fe;}
        .category-header{display:flex;align-items:center;gap:12px;cursor:pointer;}
        .category-cover{width:52px;height:52px;background:#eef3fc;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:28px;}
        .category-info{flex:1;}
        .category-title{font-weight:680;color:#0f293f;font-size:18px;}
        .category-meta{display:flex;gap:16px;margin-top:4px;font-size:13px;color:#58708c;}
        .category-desc{font-size:14px;color:#4a607a;margin-top:6px;}
        .expand-icon{font-size:24px;color:#8da0b8;transition:0.2s;}
        .expanded .expand-icon{transform:rotate(90deg);}

        .lessons-list{display:none;margin-top:16px;border-top:1px solid #eef2f8;padding-top:12px;}
        .expanded .lessons-list{display:block;}
        .lesson-item-sub{padding:12px 16px;background:#f9fbfe;border-radius:18px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px;border:1px solid transparent;}
        .lesson-item-sub:hover{background:#eef4ff;border-color:#cbdaf0;}
        .lesson-item-sub.active{background:#e0ebff;border-color:#1e3c72;}
        .lesson-index{width:28px;height:28px;background:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:600;color:#1e3c72;}
        .lesson-info-sub{flex:1;}
        .lesson-title-sub{font-weight:600;color:#1e293b;}

        .vocab-panel{background:#fff;border-radius:24px;padding:20px;margin-top:20px;border:1px solid #eef2f8;}
        .vocab-header{display:flex;justify-content:space-between;margin-bottom:16px;}
        .vocab-list{max-height:200px;overflow-y:auto;}
        .vocab-item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #edf2f8;}

        #audioPlayer{display:none;}
        .footer-note{margin-top:40px;text-align:center;color:#859ab3;font-size:14px;border-top:1px solid #dee8f2;padding-top:24px;}
    </style>
</head>
<body>
<div id="app">
    <div class="app-header">
        <h1>🎧 听读空间</h1>
        <p></p>
    </div>

    <div class="categories-wrap" id="categoryContainer">
        <div class="cat-pill active" data-cat="all">全部</div>
    </div>

    <div class="fav-section">
        <div class="vocab-badge" id="showVocabBtn">📘 生词本 (<span id="vocabCount">0</span>)</div>
        <div class="fav-badge" id="showFavoritesBtn">⭐ 我的收藏 (<span id="favCount">0</span>)</div>
    </div>

    <div class="player-section">
        <div class="now-info">
            <div class="cover-badge" id="playerCover">🎵</div>
            <div class="title-wrap">
                <div class="current-title" id="currentTitle">点击课时播放</div>
                <div class="current-subtitle" id="currentSubtitle"></div>
            </div>
        </div>
        <div class="progress-area">
            <div class="time-row">
                <span class="time-text" id="currentTime">0:00</span>
                <input type="range" id="progressBar" class="progress-bar" value="0" step="0.1" max="100">
                <span class="time-text" id="durationTime">0:00</span>
            </div>
        </div>
        <div class="ctrl-bar">
            <div class="ctrl-left">
                <button class="ctrl-btn" id="prevBtn">⏮️</button>
                <button class="ctrl-btn play-btn" id="playBtn">▶️</button>
                <button class="ctrl-btn" id="nextBtn">⏭️</button>
            </div>
            <div class="ctrl-right">
                <select class="speed-select" id="speedSelect">
                    <option value="0.5">0.5x</option><option value="0.75">0.75x</option>
                    <option value="1" selected>1.0x</option><option value="1.25">1.25x</option><option value="1.5">1.5x</option><option value="2.0">2.0x</option>
                </select>
                <div class="loop-group">
                    <span class="loop-opt" data-mode="0">🔁列表</span>
                    <span class="loop-opt" data-mode="1">🔂单曲</span>
                    <span class="loop-opt" data-mode="2">🎲随机</span>
                </div>
                <button class="ab-loop-btn" id="abLoopBtn">🔄 AB循环</button>
                <button class="fav-toggle" id="favCurrentBtn">🤍 收藏</button>
            </div>
        </div>

        <div class="extra-panel">
            <div class="panel-tabs">
                <span class="tab-btn active" data-tab="transcript">📄 原文</span>
                <span class="tab-btn" data-tab="dictation">✏️ 听写填空</span>
            </div>
            <div id="transcriptPanel">
                <div class="transcript-header">
                    <span>📖 听力原文</span>
                    <button id="toggleTranscriptBtn" style="background:none;border:none;color:#1e3c72;">隐藏</button>
                </div>
                <div class="transcript-box" id="transcriptContent">暂无原文</div>
            </div>
            <div id="dictationPanel" style="display:none;">
                <div style="display:flex; align-items:center; margin-bottom:12px;">
                    <div class="mode-switch">
                        <span class="mode-btn active" data-dict-mode="random">🎲 随机填空</span>
                        <span class="mode-btn" data-dict-mode="custom">✏️ 自定义选择</span>
                    </div>
                    <button class="refresh-btn" id="refreshDictationBtn">🔄 刷新题目</button>
                </div>
                <div id="customWordSelectorWrapper" style="display:none;">
                    <div style="margin-bottom:8px; font-size:14px; color:#44566c;">点击词汇设为填空项：</div>
                    <div class="word-selector" id="wordSelector"></div>
                </div>
                <div class="dictation-text" id="dictationExercise"></div>
                <button class="check-btn" id="checkDictationBtn">✅ 校对答案</button>
                <div class="result-feedback" id="dictationFeedback"></div>
            </div>
        </div>
    </div>

    <div class="list-header">
        <span class="section-title">📚 听力专栏</span>
        <span class="count-badge" id="lessonCount">9 个栏目</span>
    </div>
    <div class="category-grid" id="categoryList"></div>
    <audio id="audioPlayer" preload="metadata"></audio>

    <div id="globalVocabPanel" class="vocab-panel" style="display:none;">
        <div class="vocab-header"><span>📘 生词本</span><button id="clearAllVocabBtn">清空</button></div>
        <div class="vocab-list" id="vocabListContainer"></div>
    </div>
    <div class="footer-note">
        朱古力课堂 © 2002-2026
    </div>
</div>

<script>
    (function(){
        "use strict";

        // ---------- 初始数据 (九大栏目，每个栏目内含示例课时，可自行增删) ----------
        const DEFAULT_CATEGORIES = [
            { id:1, title:"BBC精选", category:"BBC精选", count:"2000", sub:"95w+", desc:"英国广播新闻，含中英字幕、讲解及听写训练。", cover:"🇬🇧",
              lessons: [
                  { id:"1-1", title:"气候变化新措施", audio:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", transcript:"The United Kingdom has announced new measures to tackle climate change. The Prime Minister said that reducing carbon emissions is a top priority. Experts warn that without immediate action, the consequences could be severe." },
                  { id:"1-2", title:"经济复苏计划", audio:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3", transcript:"The government has unveiled a multi-billion pound recovery plan aimed at boosting the post-pandemic economy." }
              ] },
            { id:2, title:"VOA慢速英语", category:"VOA慢速英语", count:"2000", sub:"126w+", desc:"VOA官方授权，每日同步，适合初学者。", cover:"🐢",
              lessons: [
                  { id:"2-1", title:"火星发现水证据", audio:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3", transcript:"Scientists say they have found evidence of water on Mars. This discovery could mean that life once existed on the red planet. The research was published in the journal Nature." }
              ] },
            { id:3, title:"VOA常速英语", category:"VOA常速英语", count:"1618", sub:"76w+", desc:"VOA官方授权，常速新闻（暂停更新说明已标注）。", cover:"⚡",
              lessons: [
                  { id:"3-1", title:"白宫预算削减", audio:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3", transcript:"The White House has ordered a significant budget cut, leading to the suspension of most VOA employees. The future of international broadcasting remains uncertain." }
              ] },
            { id:4, title:"经济学人合集", category:"经济学人", count:"2000", sub:"78w+", desc:"《经济学人》国际新闻周刊，政商精英必读。", cover:"📊",
              lessons: [
                  { id:"4-1", title:"全球通胀挑战", audio:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3", transcript:"Global inflation continues to challenge central banks. The Federal Reserve signaled further interest rate hikes. Economists are divided on whether a soft landing is possible." }
              ] },
            { id:5, title:"VOA慢速-时事新闻", category:"VOA慢速英语", count:"1022", sub:"3w+", desc:"VOA慢速 In the News 系列。", cover:"📰",
              lessons: [
                  { id:"5-1", title:"新病毒变种", audio:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3", transcript:"Health officials are concerned about a new virus variant spreading in several countries. Vaccination remains the best defense, according to experts." }
              ] },
            { id:6, title:"科学美国人", category:"科学美国人", count:"1973", sub:"33w+", desc:"60秒科学，托福雅思听力绝佳材料。", cover:"🔬",
              lessons: [
                  { id:"6-1", title:"海豚独特哨声", audio:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-7.mp3", transcript:"A new study reveals that dolphins use unique whistles to identify each other. This suggests a complex social structure similar to human names." }
              ] },
            { id:7, title:"NPR News", category:"NPR News", count:"928", sub:"9w+", desc:"美国国家公共电台新闻，每月更新。", cover:"🎙️",
              lessons: [
                  { id:"7-1", title:"最高法院网络言论案", audio:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3", transcript:"The Supreme Court heard arguments in a case that could reshape internet speech laws. Tech companies are watching closely." }
              ] },
            { id:8, title:"TED演讲视频", category:"TED演讲", count:"1258", sub:"43w+", desc:"TED官方授权演讲，覆盖科技/设计/娱乐。", cover:"💡",
              lessons: [
                  { id:"8-1", title:"创造力是一种操作方式", audio:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-9.mp3", transcript:"Creativity is not a talent, it's a way of operating. We need to create environments where people feel safe to fail and try new things." }
              ] },
            { id:9, title:"AP News", category:"AP News", count:"1060", sub:"5w+", desc:"美联社一分钟新闻，每日更新。", cover:"📡",
              lessons: [
                  { id:"9-1", title:"就业报告强劲", audio:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", transcript:"The latest jobs report shows stronger than expected growth. Unemployment remains at historic lows. Markets reacted positively to the news." }
              ] }
        ];

        // ---------- 全局变量 ----------
        let categories = [];
        let filteredCategories = [];
        let currentLesson = null;
        let currentCategory = null;
        let isPlaying = false;
        let loopMode = 0;
        let favorites = new Set();
        let vocabList = [];
        let dictMode = 'random';
        let selectedWords = new Set();
        let currentWords = [];
        let abLoopActive = false, loopStart = 0, loopEnd = 0;

        // DOM 元素
        const audioPlayer = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressBar = document.getElementById('progressBar');
        const currentTimeSpan = document.getElementById('currentTime');
        const durationTimeSpan = document.getElementById('durationTime');
        const speedSelect = document.getElementById('speedSelect');
        const currentTitleEl = document.getElementById('currentTitle');
        const currentSubtitleEl = document.getElementById('currentSubtitle');
        const playerCover = document.getElementById('playerCover');
        const categoryListEl = document.getElementById('categoryList');
        const categoryContainer = document.getElementById('categoryContainer');
        const lessonCountSpan = document.getElementById('lessonCount');
        const favCurrentBtn = document.getElementById('favCurrentBtn');
        const showFavoritesBtn = document.getElementById('showFavoritesBtn');
        const favCountSpan = document.getElementById('favCount');
        const transcriptContent = document.getElementById('transcriptContent');
        const toggleTranscriptBtn = document.getElementById('toggleTranscriptBtn');
        const tabBtns = document.querySelectorAll('.tab-btn');
        const transcriptPanel = document.getElementById('transcriptPanel');
        const dictationPanel = document.getElementById('dictationPanel');
        const wordSelectorDiv = document.getElementById('wordSelector');
        const customWordSelectorWrapper = document.getElementById('customWordSelectorWrapper');
        const dictationExercise = document.getElementById('dictationExercise');
        const checkDictationBtn = document.getElementById('checkDictationBtn');
        const dictationFeedback = document.getElementById('dictationFeedback');
        const modeBtns = document.querySelectorAll('[data-dict-mode]');
        const refreshBtn = document.getElementById('refreshDictationBtn');
        const showVocabBtn = document.getElementById('showVocabBtn');
        const vocabCountSpan = document.getElementById('vocabCount');
        const globalVocabPanel = document.getElementById('globalVocabPanel');
        const vocabListContainer = document.getElementById('vocabListContainer');
        const clearAllVocabBtn = document.getElementById('clearAllVocabBtn');
        const abLoopBtn = document.getElementById('abLoopBtn');

        let currentViewMode = 'all';
        let currentCatFilter = 'all';

        // ---------- 辅助函数 ----------
        function formatTime(sec){ if(isNaN(sec))return'0:00'; const m=Math.floor(sec/60),s=Math.floor(sec%60); return`${m}:${s<10?'0':''}${s}`; }
        function updateFavUI(){ favCountSpan.textContent = favorites.size; }
        function loadFav(){ try{ const v=localStorage.getItem('fav_lessons_v2'); if(v) favorites=new Set(JSON.parse(v)); }catch(e){} updateFavUI(); }
        function saveFav(){ localStorage.setItem('fav_lessons_v2', JSON.stringify([...favorites])); updateFavUI(); }
        function loadVocab(){ try{ const v=localStorage.getItem('vocab_list_v2'); if(v) vocabList=JSON.parse(v); }catch(e){} updateVocabUI(); }
        function saveVocab(){ localStorage.setItem('vocab_list_v2', JSON.stringify(vocabList)); updateVocabUI(); }
        function updateVocabUI(){ vocabCountSpan.textContent = vocabList.length; renderVocabList(); }
        function addToVocab(word, source){ if(!vocabList.find(v=>v.word.toLowerCase()===word.toLowerCase())){ vocabList.push({word, source}); saveVocab(); } }
        function removeVocab(word){ vocabList = vocabList.filter(v=>v.word!==word); saveVocab(); }
        function renderVocabList(){
            if(!vocabListContainer) return;
            if(!vocabList.length){ vocabListContainer.innerHTML='<div style="color:#888;">暂无生词</div>'; return; }
            let html='';
            vocabList.forEach(v=>{ html+=`<div class="vocab-item"><span><strong>${v.word}</strong> <span style="color:#6f85a0;">${v.source||''}</span></span><span style="cursor:pointer;color:#c0392b;" data-word="${v.word}">🗑️</span></div>`; });
            vocabListContainer.innerHTML=html;
            document.querySelectorAll('.vocab-item span[data-word]').forEach(el=> el.addEventListener('click',e=> removeVocab(e.target.dataset.word)));
        }

        function updatePlayerUI(){
            if(currentLesson){
                currentTitleEl.textContent = currentLesson.title;
                currentSubtitleEl.textContent = currentCategory?.title || '';
                playerCover.textContent = currentCategory?.cover || '🎵';
                transcriptContent.textContent = currentLesson.transcript || '暂无原文';
            } else {
                currentTitleEl.textContent = '点击课时播放';
                currentSubtitleEl.textContent = '';
                playerCover.textContent = '🎵';
                transcriptContent.textContent = '暂无原文';
            }
            const id = currentLesson?.id;
            favCurrentBtn.innerHTML = (id && favorites.has(id)) ? '❤️ 已收藏' : '🤍 收藏';
            if(dictationPanel.style.display !== 'none') updateDictationPanel();
        }

        function playLesson(lesson, category){
            currentLesson = lesson;
            currentCategory = category;
            audioPlayer.src = lesson.audio;
            audioPlayer.load();
            updatePlayerUI();
            renderCategoryList();
            if(isPlaying) audioPlayer.play().catch(()=>{});
        }

        function togglePlay(){
            if(!audioPlayer.src) return;
            if(audioPlayer.paused){ audioPlayer.play(); playBtn.textContent='⏸️'; isPlaying=true; }
            else { audioPlayer.pause(); playBtn.textContent='▶️'; isPlaying=false; }
        }

        function getFlatLessons(){
            let flat = [];
            filteredCategories.forEach(cat => cat.lessons.forEach(l => flat.push({lesson:l, category:cat})));
            return flat;
        }

        function prevLesson(){ const flat=getFlatLessons(); if(!flat.length)return; let idx=flat.findIndex(i=>i.lesson.id===currentLesson?.id); idx=(idx-1+flat.length)%flat.length; playLesson(flat[idx].lesson, flat[idx].category); }
        function nextLesson(){ const flat=getFlatLessons(); if(!flat.length)return; let idx=flat.findIndex(i=>i.lesson.id===currentLesson?.id); idx=(idx+1)%flat.length; playLesson(flat[idx].lesson, flat[idx].category); }

        function renderCategoryList(){
            if(!filteredCategories.length){ categoryListEl.innerHTML='<div style="padding:30px;text-align:center;color:#888;">暂无栏目</div>'; return; }
            let html='';
            filteredCategories.forEach(cat => {
                const expanded = cat.expanded || false;
                html+=`<div class="category-card ${expanded?'expanded':''}" data-cat-id="${cat.id}">
                    <div class="category-header"><div class="category-cover">${cat.cover}</div><div class="category-info"><div class="category-title">${cat.title}</div><div class="category-meta"><span>📄 ${cat.count}</span><span>👥 ${cat.sub}</span></div><div class="category-desc">${cat.desc}</div></div><span class="expand-icon">▶</span></div>
                    <div class="lessons-list">`;
                cat.lessons.forEach((lesson,idx)=>{
                    const active = currentLesson?.id === lesson.id;
                    const fav = favorites.has(lesson.id);
                    html+=`<div class="lesson-item-sub ${active?'active':''}" data-lesson-id="${lesson.id}"><span class="lesson-index">${idx+1}</span><div class="lesson-info-sub"><div class="lesson-title-sub">${lesson.title}</div></div><span class="fav-icon-small" data-lesson-id="${lesson.id}" style="cursor:pointer;margin-left:8px;color:${fav?'#e67e22':'#b0c3db'};">${fav?'★':'☆'}</span></div>`;
                });
                html+=`</div></div>`;
            });
            categoryListEl.innerHTML=html;
            lessonCountSpan.textContent = `${filteredCategories.length} 个栏目`;
            document.querySelectorAll('.category-header').forEach(h=>h.addEventListener('click',e=>{ if(e.target.closest('.fav-icon-small'))return; const card=h.closest('.category-card'); const cat=filteredCategories.find(c=>c.id==card.dataset.catId); if(cat) cat.expanded=!cat.expanded; renderCategoryList(); }));
            document.querySelectorAll('.lesson-item-sub').forEach(el=>el.addEventListener('click',e=>{ if(e.target.closest('.fav-icon-small'))return; const lid=el.dataset.lessonId; for(let cat of filteredCategories){ const l=cat.lessons.find(l=>l.id===lid); if(l){ playLesson(l,cat); break; } } }));
            document.querySelectorAll('.fav-icon-small').forEach(s=>s.addEventListener('click',e=>{ e.stopPropagation(); const lid=s.dataset.lessonId; if(favorites.has(lid)) favorites.delete(lid); else favorites.add(lid); saveFav(); renderCategoryList(); updatePlayerUI(); }));
        }

        function renderCategories(){
            const cats = [...new Set(categories.map(c=>c.category))];
            let html=`<div class="cat-pill ${currentViewMode==='all'?'active':''}" data-cat="all">全部</div>`;
            cats.forEach(c=>{ html+=`<div class="cat-pill ${(currentViewMode==='category'&&currentCatFilter===c)?'active':''}" data-cat="${c}">${c}</div>`; });
            categoryContainer.innerHTML=html;
            document.querySelectorAll('.cat-pill').forEach(b=>b.addEventListener('click',()=>{
                const cat=b.dataset.cat; currentViewMode=cat==='all'?'all':'category'; currentCatFilter=cat;
                applyFilter(); document.querySelectorAll('.cat-pill').forEach(p=>p.classList.remove('active')); b.classList.add('active');
            }));
        }

        function applyFilter(){
            if(currentViewMode==='all') filteredCategories=categories.map(c=>({...c, expanded:c.expanded||false}));
            else filteredCategories=categories.filter(c=>c.category===currentCatFilter).map(c=>({...c, expanded:c.expanded||false}));
            renderCategoryList();
        }

        function extractWords(t){ return [...new Set(t.split(/\s+/).filter(w=>w.length>1).map(w=>w.replace(/[.,!?;:]/g,'')))]; }
        function updateDictationPanel(){
            if(!currentLesson) return;
            currentWords = extractWords(currentLesson.transcript||'');
            if(dictMode==='custom'){ customWordSelectorWrapper.style.display='block'; refreshBtn.style.display='none'; renderWordSelector(); }
            else { customWordSelectorWrapper.style.display='none'; refreshBtn.style.display='flex'; }
            renderDictationExercise();
        }
        function renderWordSelector(){
            if(!currentWords.length){ wordSelectorDiv.innerHTML='<span style="color:#888;">暂无词汇</span>'; return; }
            let html=''; currentWords.forEach(w=>{ const sel=selectedWords.has(w)?'selected':''; html+=`<span class="word-chip ${sel}" data-word="${w}">${w}</span>`; });
            wordSelectorDiv.innerHTML=html;
            document.querySelectorAll('.word-chip').forEach(c=>c.addEventListener('click',()=>{ const w=c.dataset.word; if(selectedWords.has(w)) selectedWords.delete(w); else selectedWords.add(w); renderWordSelector(); renderDictationExercise(); }));
        }
        function renderDictationExercise(){
            if(!currentLesson||!currentLesson.transcript){ dictationExercise.innerHTML='<span style="color:#888;">暂无原文</span>'; return; }
            let text=currentLesson.transcript, wordsToBlank=[];
            if(dictMode==='custom'){ wordsToBlank=Array.from(selectedWords); if(!wordsToBlank.length){ dictationExercise.innerHTML='<span style="color:#888;">请选择词汇</span>'; return; } }
            else { if(!currentWords.length){ dictationExercise.innerHTML='<span style="color:#888;">词汇不足</span>'; return; } wordsToBlank=[...currentWords].sort(()=>0.5-Math.random()).slice(0,5); }
            const pattern=new RegExp(`\\b(${wordsToBlank.join('|')})\\b`,'gi');
            dictationExercise.innerHTML=text.replace(pattern,m=>`<input type="text" class="blank-input" data-answer="${m}" placeholder="_____">`);
        }
        function checkDictation(){
            const inputs=document.querySelectorAll('.blank-input'); if(!inputs.length) return;
            let correct=0; inputs.forEach(i=>{ if(i.value.trim().toLowerCase()===i.dataset.answer.toLowerCase()){ i.style.borderColor='#2ecc71'; correct++; } else { i.style.borderColor='#e74c3c'; const btn=document.createElement('span'); btn.innerHTML='<button class="add-vocab-btn" style="margin-left:6px;">➕生词</button>'; btn.querySelector('button').addEventListener('click',()=>{ addToVocab(i.dataset.answer, currentLesson?.title); }); i.parentNode.insertBefore(btn,i.nextSibling); } });
            dictationFeedback.textContent=`✅ 正确 ${correct}/${inputs.length}`;
        }

        async function loadData(){
            try{
                const res=await fetch('data.json');
                if(res.ok) categories=await res.json();
                else throw new Error();
            }catch(e){
                categories=DEFAULT_CATEGORIES;
            }
            filteredCategories=categories.map(c=>({...c, expanded:false}));
            renderCategories(); renderCategoryList();
        }

        function bindEvents(){
            audioPlayer.addEventListener('loadedmetadata',()=>{ durationTimeSpan.textContent=formatTime(audioPlayer.duration); progressBar.max=audioPlayer.duration||0; });
            audioPlayer.addEventListener('timeupdate',()=>{ currentTimeSpan.textContent=formatTime(audioPlayer.currentTime); progressBar.value=audioPlayer.currentTime; });
            audioPlayer.addEventListener('ended',()=>{ if(loopMode===1) audioPlayer.play(); else nextLesson(); });
            audioPlayer.addEventListener('play',()=>{ playBtn.textContent='⏸️'; isPlaying=true; });
            audioPlayer.addEventListener('pause',()=>{ playBtn.textContent='▶️'; isPlaying=false; });
            progressBar.addEventListener('input',e=>audioPlayer.currentTime=e.target.value);
            speedSelect.addEventListener('change',e=>audioPlayer.playbackRate=parseFloat(e.target.value));
            playBtn.addEventListener('click',togglePlay);
            prevBtn.addEventListener('click',prevLesson); nextBtn.addEventListener('click',nextLesson);
            document.querySelectorAll('.loop-opt').forEach(o=>o.addEventListener('click',()=>{ loopMode=parseInt(o.dataset.mode); document.querySelectorAll('.loop-opt').forEach(oo=>oo.classList.remove('active')); o.classList.add('active'); }));
            favCurrentBtn.addEventListener('click',()=>{ if(!currentLesson)return; const id=currentLesson.id; if(favorites.has(id)) favorites.delete(id); else favorites.add(id); saveFav(); updatePlayerUI(); renderCategoryList(); });
            showFavoritesBtn.addEventListener('click',()=>{ filteredCategories=categories.filter(c=>c.lessons.some(l=>favorites.has(l.id))).map(c=>({...c,expanded:true})); renderCategoryList(); });
            toggleTranscriptBtn.addEventListener('click',()=>{ transcriptContent.style.display=transcriptContent.style.display==='none'?'block':'none'; });
            tabBtns.forEach(t=>t.addEventListener('click',()=>{ const tab=t.dataset.tab; tabBtns.forEach(tt=>tt.classList.remove('active')); t.classList.add('active'); if(tab==='transcript'){ transcriptPanel.style.display='block'; dictationPanel.style.display='none'; } else { transcriptPanel.style.display='none'; dictationPanel.style.display='block'; updateDictationPanel(); } }));
            modeBtns.forEach(b=>b.addEventListener('click',()=>{ dictMode=b.dataset.dictMode; modeBtns.forEach(m=>m.classList.remove('active')); b.classList.add('active'); selectedWords.clear(); updateDictationPanel(); }));
            refreshBtn.addEventListener('click',()=>renderDictationExercise());
            checkDictationBtn.addEventListener('click',checkDictation);
            showVocabBtn.addEventListener('click',()=>{ globalVocabPanel.style.display=globalVocabPanel.style.display==='none'?'block':'none'; renderVocabList(); });
            clearAllVocabBtn.addEventListener('click',()=>{ vocabList=[]; saveVocab(); });
            abLoopBtn.addEventListener('click',()=>{ if(!audioPlayer.src)return; if(!abLoopActive){ loopStart=audioPlayer.currentTime; abLoopBtn.textContent='🔴 设置终点'; abLoopActive=true; } else { loopEnd=audioPlayer.currentTime; if(loopEnd<=loopStart){ alert('终点需大于起点'); return; } abLoopBtn.textContent=`🔄 AB循环 (${formatTime(loopStart)}-${formatTime(loopEnd)})`; audioPlayer.addEventListener('timeupdate', function abCheck(){ if(audioPlayer.currentTime>=loopEnd) audioPlayer.currentTime=loopStart; }); } });
        }

        loadFav(); loadVocab();
        bindEvents();
        loadData();
    })();
</script>
</body>
</html>
